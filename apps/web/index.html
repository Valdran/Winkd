<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Winkd Messenger</title>
    <script>
      (function () {
        try {
          var raw = localStorage.getItem('winkd-auth')
          var auth = raw ? JSON.parse(raw) : null
          var token = auth && auth.state && auth.state.session && auth.state.session.token
          window.location.replace(token ? 'app.html' : 'login.html')
        } catch (e) {
          window.location.replace('login.html')
        }
      })()
    </script>
  </head>
  <body></body>
</html>
